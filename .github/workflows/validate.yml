name: Validate skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependency
        run: python3 -m pip install PyYAML
      - name: Validate skill structure
        run: python3 scripts/quick_validate.py skills/design-progressive-prototypes
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
      - name: Validate example
        run: python3 skills/design-progressive-prototypes/scripts/validate_prototype.py --initial examples/appointment-booking/PROTOTYPE.md
